<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muzeo — Don't just learn AI. Have AI learn you.</title>
  <meta name="description" content="Muzeo is your AI muse. Five expert minds. Productive tension. Built for decisions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #0B1221;
      color: #F9F8F6;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Page column ─────────────────────────────────────────────── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 32px 80px;
    }

    /* ── Logo ────────────────────────────────────────────────────── */
    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: clamp(40px, 7vh, 72px);
      margin-bottom: clamp(36px, 6vh, 64px);
    }

    .fw-icon {
      width: 26px;
      height: 26px;
      object-fit: contain;
      opacity: 0.6;
      margin-bottom: 14px;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(27px, 4.0vw, 45px);
      font-weight: 400;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: #F9F8F6;
      line-height: 1;
    }

    /* ── Coming soon eyebrow ─────────────────────────────────────── */
    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #C4973F;
      margin-bottom: clamp(24px, 4vh, 44px);
    }

    /* ── Headline ────────────────────────────────────────────────── */
    .headline-block {
      text-align: center;
      max-width: 560px;
      margin-bottom: clamp(18px, 3vh, 32px);
    }

    .headline-block h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(38px, 6.5vw, 68px);
      font-weight: 400;
      line-height: 1.15;
    }

    .hl-plain {
      display: block;
      color: #F9F8F6;
      font-style: normal;
    }

    .hl-italic {
      display: block;
      color: #C4973F;
      font-style: italic;
    }

    /* ── Sub-headline ────────────────────────────────────────────── */
    .subhead {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(15px, 1.8vw, 19px);
      font-weight: 400;
      font-style: normal;
      color: #A89F98;
      line-height: 1.7;
      text-align: center;
      max-width: 400px;
      margin-bottom: clamp(32px, 6vh, 60px);
    }

    /* ── Orb ─────────────────────────────────────────────────────── */
    .orb-wrap {
      position: relative;
      width: clamp(378px, 70vw, 648px);
      height: clamp(240px, 42vw, 380px);
      margin-bottom: clamp(32px, 6vh, 60px);
      flex-shrink: 0;
      overflow: visible;
    }

    /* concentric atmosphere rings */
    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.035);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .orb-ring-1 { width: 100%;  height: 100%; }
    .orb-ring-2 { width: 138%; height: 138%; }
    .orb-ring-3 { width: 176%; height: 176%; border-color: rgba(255,255,255,0.018); }

    #orb-canvas {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      height: 160%;
      width: auto;
      aspect-ratio: 1;
      display: block;
      -webkit-mask-image: radial-gradient(circle at 50% 50%, black 32%, transparent 72%);
      mask-image:         radial-gradient(circle at 50% 50%, black 32%, transparent 72%);
    }

    /* ── Reserve your place label ────────────────────────────────── */
    .section-label {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #C4973F;
      margin-bottom: 20px;
      text-align: center;
    }

    /* ── Form card ───────────────────────────────────────────────── */
    .form-card {
      position: relative;
      width: 100%;
      max-width: 520px;
      background: #0D1726;
      padding: 36px 36px 40px;
      margin-bottom: clamp(40px, 8vh, 80px);
    }

    /* corner brackets */
    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: #C4973F;
      border-style: solid;
    }
    .corner.tl { top: -1px;    left: -1px;    border-width: 1.5px 0 0 1.5px; }
    .corner.tr { top: -1px;    right: -1px;   border-width: 1.5px 1.5px 0 0; }
    .corner.bl { bottom: -1px; left: -1px;    border-width: 0 0 1.5px 1.5px; }
    .corner.br { bottom: -1px; right: -1px;   border-width: 0 1.5px 1.5px 0; }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(24px, 3.5vw, 34px);
      font-weight: 400;
      color: #F9F8F6;
      margin-bottom: 8px;
      text-align: center;
    }

    .card-sub {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: #A89F98;
      margin-bottom: 28px;
      line-height: 1.6;
      text-align: center;
    }

    /* embed placeholder area */
    #crm-form-embed {
      border: 1px dashed #263348;
      padding: 32px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-height: 100px;
    }

    .embed-placeholder {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #3D4F6A;
      text-align: center;
    }

    .btn-reserve {
      width: 100%;
      background: #C4973F;
      border: none;
      color: #0B1221;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 15px 24px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .btn-reserve:hover { opacity: 0.88; }

    /* ── Footer ──────────────────────────────────────────────────── */
    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    .footer-mark {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #3D4F6A;
    }

    .footer-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-style: italic;
      color: #3D4F6A;
    }
  </style>
</head>

  <script>
    // Orb — adapted from MuseOrb.jsx, standalone canvas, no dependencies

    const BRAIN_COLORS = {
      strategy:   [79,  179, 255],
      creative:   [255, 179, 64],
      finance:    [0,   229, 160],
      leadership: [196, 111, 255],
      people:     [255, 107, 71],
    };

    const ACTIVE = ['strategy', 'creative', 'finance', 'leadership'];

    function lerp(a, b, t) {
      return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
    }
    function smoothstep(t) { return t*t*(3-2*t); }
    function rgba(c, a) { return `rgba(${Math.round(c[0])},${Math.round(c[1])},${Math.round(c[2])},${a})`; }
    function noise(t, f, p) {
      return Math.sin(t*f+p)*0.5 + Math.sin(t*f*1.7+p*1.3)*0.3 + Math.sin(t*f*3.1+p*0.7)*0.2;
    }

    function colorAt(tSec) {
      const cols = ACTIVE.map(b => BRAIN_COLORS[b]);
      const idx  = (tSec * 0.30) % cols.length;
      const i0   = Math.floor(idx) % cols.length;
      return lerp(cols[i0], cols[(i0+1)%cols.length], smoothstep(idx - Math.floor(idx)));
    }

    const TENDRILS = Array.from({ length: 18 }, () => ({
      baseAngle: -Math.PI/2 + (Math.random()-0.5)*Math.PI*1.4,
      phase:  Math.random()*Math.PI*2,
      phase2: Math.random()*Math.PI*2,
      phase3: Math.random()*Math.PI*2,
      life:   0.65 + Math.random()*0.35,
      spd:    0.6 + Math.random()*1.2,
      reach:  65  + Math.random()*75,
      width:  55  + Math.random()*65,
      cOff:   Math.random(),
    }));

    const P = { spd:0.65, en:0.75, poolR:310, bodyR:78, coreR:32, poolA:0.24, bodyA:0.68, coreA:0.98, blobA:0.58 };

    function drawOrb(ctx, ts) {
      const W=400, H=400, CX=W/2, CY=H/2;
      ctx.clearRect(0,0,W,H);
      const tSec = ts*0.001;
      const t    = tSec*P.spd;
      const col  = colorAt(tSec);

      ctx.save();
      ctx.translate(CX, CY);
      ctx.translate(-4, -3);
      ctx.translate(
        noise(t,0.4,0)*8*P.en + noise(t,1.1,1.7)*4*P.en,
        noise(t,0.35,2)*6*P.en + noise(t,0.9,0.5)*3*P.en,
      );

      const atmo = ctx.createRadialGradient(-8,-6,0,-8,-6,390);
      atmo.addColorStop(0,    rgba(col,0.13));
      atmo.addColorStop(0.35, rgba(col,0.07));
      atmo.addColorStop(0.65, rgba(col,0.025));
      atmo.addColorStop(1,    rgba(col,0));
      ctx.beginPath(); ctx.arc(-8,-6,390,0,Math.PI*2);
      ctx.fillStyle=atmo; ctx.fill();

      const pool = ctx.createRadialGradient(0,0,0,0,0,P.poolR);
      pool.addColorStop(0,   rgba(col,P.poolA*2.5));
      pool.addColorStop(0.5, rgba(col,P.poolA));
      pool.addColorStop(1,   rgba(col,0));
      ctx.beginPath(); ctx.arc(0,0,P.poolR,0,Math.PI*2);
      ctx.fillStyle=pool; ctx.fill();

      const cols = ACTIVE.map(b=>BRAIN_COLORS[b]);
      TENDRILS.forEach(td => {
        const tl  = t*td.spd+td.phase;
        const ang = td.baseAngle + noise(tl,0.3,td.phase)*0.9*P.en + noise(tl,0.7,td.phase2)*0.5*P.en;
        const d   = td.reach*(0.4+noise(tl,0.5,td.phase3)*0.6+P.en*0.4);
        const tx  = Math.cos(ang)*d, ty=Math.sin(ang)*d;
        const w   = td.width*(0.5+noise(tl,0.8,td.phase2)*0.5)*(0.6+P.en*0.6);
        const al  = P.blobA*td.life*(0.5+(Math.sin(tl*1.3+td.phase)*0.5+0.5)*0.5);
        const raw = (tSec*0.4+td.cOff*cols.length) % cols.length;
        const ci  = Math.floor(raw) % cols.length;
        const tc  = lerp(cols[ci], cols[(ci+1)%cols.length], smoothstep(raw-Math.floor(raw)));
        const mx=tx*0.5, my=ty*0.5;
        const gr=ctx.createRadialGradient(mx*0.3,my*0.3,0,mx,my,w);
        gr.addColorStop(0,rgba(tc,al)); gr.addColorStop(0.4,rgba(tc,al*0.55)); gr.addColorStop(1,rgba(tc,0));
        ctx.beginPath(); ctx.arc(mx,my,w,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
        const lg=ctx.createRadialGradient(tx,ty,0,tx,ty,w*0.45);
        lg.addColorStop(0,rgba(tc,al*0.6)); lg.addColorStop(1,rgba(tc,0));
        ctx.beginPath(); ctx.arc(tx,ty,w*0.45,0,Math.PI*2); ctx.fillStyle=lg; ctx.fill();
      });

      const br=P.bodyR*(1+Math.sin(t*2.2)*0.06*P.en);
      const body=ctx.createRadialGradient(0,0,0,0,0,br);
      body.addColorStop(0,rgba(col,P.bodyA)); body.addColorStop(0.45,rgba(col,P.bodyA*0.58));
      body.addColorStop(0.8,rgba(col,P.bodyA*0.22)); body.addColorStop(1,rgba(col,0));
      ctx.beginPath(); ctx.arc(0,0,br,0,Math.PI*2); ctx.fillStyle=body; ctx.fill();

      const cr=P.coreR*(1+Math.sin(t*3.1)*0.08*P.en);
      const core=ctx.createRadialGradient(0,0,0,0,0,cr);
      core.addColorStop(0,rgba([255,252,240],P.coreA)); core.addColorStop(0.35,rgba(col,P.coreA*0.88));
      core.addColorStop(0.7,rgba(col,P.coreA*0.42)); core.addColorStop(1,rgba(col,0));
      ctx.beginPath(); ctx.arc(0,0,cr,0,Math.PI*2); ctx.fillStyle=core; ctx.fill();

      ctx.restore();
    }

    const canvas = document.getElementById('orb-canvas');
    const ctx    = canvas.getContext('2d');
    let   start  = null;
    function frame(ts) { if(!start) start=ts; drawOrb(ctx,ts-start); requestAnimationFrame(frame); }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
